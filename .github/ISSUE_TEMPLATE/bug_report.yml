name: Bug report
description: A command, agent, skill, or hook didn't behave as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. The more precisely you can describe what you ran
        and what happened, the faster this gets fixed.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you run, and what did the studio do?
      placeholder: I ran `/start`, answered the interview, and at step 4 it…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command / agent / skill involved
      placeholder: "/sprint-plan, backend-lead, tdd-workflow…"
  - type: dropdown
    id: track
    attributes:
      label: Track
      options:
        - software
        - game-dev
        - content
        - research
        - custom
        - not sure / N/A
  - type: input
    id: cc-version
    attributes:
      label: Claude Code version
      description: Output of `claude --version`
      placeholder: "e.g. 2.x.x"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15 / Ubuntu 24.04 / Windows 11"
  - type: textarea
    id: logs
    attributes:
      label: Relevant output or transcript
      description: Paste the relevant part of the session. Redact anything private.
      render: text
